##
## ega.conf — EGA Core configuration example
## Copy to your data directory as ega.conf (default: ~/.ega/ega.conf)
## Lines beginning with # are comments.
##

# Network
#testnet=0
#regtest=0

# P2P / RPC (defaults — docs/ega/params.md)
# main:   P2P 20201  RPC 20202
# test:   P2P 20203  RPC 20204
# regtest:P2P 20205  RPC 20206
#port=20201
#rpcport=20202

# JSON-RPC server (required for ega-cli)
server=1
#rpcuser=ega
#rpcpassword=CHANGE_ME_TO_A_LONG_RANDOM_PASSWORD
#rpcallowip=127.0.0.1

# Optional: bind only locally
#rpcbind=127.0.0.1
#bind=0.0.0.0

# Mining default algo for getblocktemplate / generatetoaddress
# Valid: randomx | verthash | yespower-ega | scrypt  (also: rx, vert, yespower, yp)
algo=randomx

# Fair launch: allow solo GBT without peers / while IBD (default off = allowed)
#gbtrequirepeers=0
#gbtrequiresynced=0

# After the network has many peers you may set:
#gbtrequirepeers=1

# Transaction index (explorer-style lookups)
#txindex=1

# Reduce disk (pruning keeps last N MiB of blocks; 0 = disable)
#prune=0

# Logging
#debug=0
#printtoconsole=0

# Tor / proxy (optional)
#proxy=127.0.0.1:9050
#onion=127.0.0.1:9050
#onlynet=onion

# Seed nodes (empty at fair launch; add community seeds later)
#addnode=example.peer:20201
