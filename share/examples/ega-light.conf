## ega-light.conf — pruned / weak-device full node
## Copy to ~/.ega/ega.conf on Android (Termux), Pi, or old laptop.
## Validates the chain; uses less disk/RAM than an archival explorer node.

server=1
listen=1
txindex=0
prune=1024
dbcache=100
maxconnections=8
listenonion=0

rpcuser=ega
rpcpassword=CHANGE_ME
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
rpcport=20202
port=20201

# Bootstrap peer (update to current seed)
addnode=105.225.100.58:20201

# Default solo mining algo for weak CPUs
algo=yespower-ega
