# Egalitarianism (EGA) Core — CI
name: Build and check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux-daemon:
    name: Linux egad (no GUI)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config bsdmainutils \
            python3 cmake ccache \
            libssl-dev libevent-dev \
            libboost-system-dev libboost-filesystem-dev libboost-thread-dev \
            libboost-chrono-dev libboost-test-dev \
            libdb-dev libdb++-dev \
            libminiupnpc-dev libzmq3-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('**/Makefile.am', 'configure.ac') }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Configure
        run: |
          ./autogen.sh
          ./configure \
            --with-daemon \
            --without-gui \
            --enable-wallet \
            --with-incompatible-bdb \
            --disable-bench \
            --disable-tests \
            CC="ccache gcc" CXX="ccache g++"

      - name: Build RandomX + egad + ega-cli
        run: |
          make -C src crypto/randomx/build/librandomx.a -j$(nproc) || true
          # RandomX builds via Makefile rule on first link
          make -C src egad ega-cli -j$(nproc)

      - name: Version smoke
        run: |
          ./src/egad -version
          ./src/ega-cli -version

      - name: Regtest genesis smoke
        run: |
          DATADIR=$(mktemp -d)
          ./src/egad -regtest -datadir="$DATADIR" -daemon
          sleep 3
          HASH=$(./src/ega-cli -regtest -datadir="$DATADIR" getblockhash 0)
          echo "genesis=$HASH"
          test "$HASH" = "7db0bcedfac1596d0be2a5b42c4b88043c207f8f29bac2796fba10ea06ae5ac0"
          ./src/ega-cli -regtest -datadir="$DATADIR" stop
